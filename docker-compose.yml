services:
  postgres:
    image: postgres:16-alpine
    container_name: wall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wall}
      POSTGRES_DB: ${POSTGRES_DB:-the_wall_test}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wall} -d ${POSTGRES_DB:-the_wall_test}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
